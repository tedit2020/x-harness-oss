name = "x-harness-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true
# account_id = "YOUR_ACCOUNT_ID"  # Set your Cloudflare account ID

# Set via: wrangler secret put API_KEY
# Set via: wrangler secret put X_ACCESS_TOKEN
# Set via: wrangler secret put X_REFRESH_TOKEN

[vars]
WORKER_URL = "https://x-harness-worker.workers.dev"

[[d1_databases]]
binding = "DB"
database_name = "x-harness"
database_id = "YOUR_D1_DATABASE_ID"

[triggers]
crons = ["*/10 * * * *"]
# 10 分毎実行（指定時刻 ±10 分以内に発火、ピッタリ運用可能）
# 旧 cron "55 2,8,11,20,22 * * *" (1 日 5 回) は配信時刻ラグ "+1h 遅延 / -5h 前倒し" 観測で構造的解決
# 副作用: engagement gates + follower snapshot も 10 分毎 = 1 日 144 回（旧 5 回の 28.8 倍）
# Workers Free 100K req/day + D1 100K writes/day 試算 ~3,500 ops/day = 許容範囲
# 配信負荷が問題になる場合は cron 分離 (scheduled posts のみ 10 分毎、他処理は別 cron) に切替可
